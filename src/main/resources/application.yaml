spring:
  application:
    name: sahayatra
  data:
    mongodb:
      uri: ""
      database: "sahayatra"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: trip-async-
security:
  jwt:
    secret-key: ""
    expiration-time: 36000000
weather:
  api:
    key: ""
    url: "http://api.openweathermap.org/data/2.5/weather"
